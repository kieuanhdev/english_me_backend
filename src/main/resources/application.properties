spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
admin.auth.email=${ADMIN_EMAIL:admin@englishme.vn}
admin.auth.password=${ADMIN_PASSWORD:admin123456}
admin.auth.role=ADMIN

# provider = speechace | mock. Khi = mock, ko cần API key và luôn trả điểm giả lập [55,95] (demo offline).
# Khi = speechace nhưng thiếu api-key, tự fallback sang mock.
englishme.ai.pronunciation.provider=${PRONUNCIATION_PROVIDER:speechace}
englishme.ai.pronunciation.api-key=${PRONUNCIATION_API_KEY:}
englishme.ai.pronunciation.timeout-ms=${PRONUNCIATION_TIMEOUT_MS:15000}
englishme.ai.pronunciation.max-retries=${PRONUNCIATION_MAX_RETRIES:1}
englishme.ai.pronunciation.speechace-url=${PRONUNCIATION_SPEECHACE_URL:https://api.speechace.co/api/scoring/text/v9/json}
# Rate limit AI giờ đọc từ app_config (AI_RATELIMIT_MAX / AI_RATELIMIT_WINDOW_SEC) — sửa qua admin.

# Swagger UI (springdoc-openapi) — mở trình duyệt: /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
