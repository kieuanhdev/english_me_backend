# View: Thymeleaf (templates ở classpath:/templates/, suffix .html)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
admin.auth.email=${ADMIN_EMAIL:admin@englishme.vn}
# KHÔNG đặt default cho password — thiếu env ADMIN_PASSWORD thì app fail-fast
# lúc khởi động, tránh chạy production với mật khẩu mặc định ai cũng biết.
admin.auth.password=${ADMIN_PASSWORD}
admin.auth.role=ADMIN

# Firebase Admin SDK — key nằm NGOÀI classpath, trỏ qua env FIREBASE_CREDENTIALS_PATH.
# Để default rỗng: FirebaseConfig tự fail-fast với message rõ ràng khi thiếu env.
# Test/CI tắt hẳn bằng englishme.firebase.enabled=false.
englishme.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:}

# Phát âm: chấm bằng Levenshtein Distance trên transcript.
# Transcript lấy từ Google Cloud Speech-to-Text (POST /api/pronunciation/assess-audio) khi bật;
# tắt/lỗi -> mobile fallback STT on-device rồi gọi /api/pronunciation/assess-text.
# Cấu hình STT (bật/tắt, service account JSON, ngôn ngữ, sample rate) đọc từ app_config
# (STT_* — V71) và sửa runtime qua /admin/config; không còn @Value ở đây.
# Rate limit AI đọc từ app_config (AI_RATELIMIT_MAX / AI_RATELIMIT_WINDOW_SEC) — sửa qua admin.

# Swagger UI (springdoc-openapi) — mở trình duyệt: /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
