spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
admin.auth.email=${ADMIN_EMAIL:admin@englishme.vn}
admin.auth.password=${ADMIN_PASSWORD:admin123456}
admin.auth.role=ADMIN

# DeepSeek chat configuration
englishme.ai.deepseek.api-key=${DEEPSEEK_API_KEY:}
englishme.ai.deepseek.model=deepseek-chat
englishme.ai.teacher-system-prompt=You are a professional English teacher. Always teach in a friendly and clear way. Correct grammar and vocabulary mistakes, explain why, provide natural alternatives, and give concise examples suitable for the learner's level.
englishme.ai.pronunciation.provider=${PRONUNCIATION_PROVIDER:speechace}
englishme.ai.pronunciation.api-key=${PRONUNCIATION_API_KEY:}
englishme.ai.pronunciation.timeout-ms=${PRONUNCIATION_TIMEOUT_MS:15000}
englishme.ai.pronunciation.max-retries=${PRONUNCIATION_MAX_RETRIES:1}
englishme.ai.pronunciation.speechace-url=${PRONUNCIATION_SPEECHACE_URL:https://api.speechace.co/api/scoring/text/v9/json}
englishme.ai.pronunciation.rate-limit.max-requests=${PRONUNCIATION_RATE_LIMIT_MAX:20}
englishme.ai.pronunciation.rate-limit.window-seconds=${PRONUNCIATION_RATE_LIMIT_WINDOW_SECONDS:3600}

# Swagger UI (springdoc-openapi) — mở trình duyệt: /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
