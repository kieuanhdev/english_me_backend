server:
  port: ${SERVER_PORT:8080}

spring:
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  application:
    name: englishme
  config:
    import: optional:file:./application-local.yml
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/englishme?currentSchema=englishme}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_schema: ${DB_SCHEMA:englishme}
        hbm2ddl:
          create_namespaces: true
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
    open-in-view: false
    show-sql: false
  thymeleaf:
    cache: ${THYMELEAF_CACHE:false}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    jwt:
      issuer: ${JWT_ISSUER:englishme}
      secret: ${JWT_SECRET:Q2hhbmdlVGhpc0RldlNlY3JldEZvckxvY2FsT25seTEyMzQ1Njc4OTA=}
      access-token-ttl-seconds: ${JWT_ACCESS_TTL:900}
      refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:1209600}

logging:
  level:
    org.hibernate.SQL: ${LOG_SQL_HIBERNATE:DEBUG}
    org.hibernate.orm.jdbc.bind: ${LOG_SQL_BIND:TRACE}
