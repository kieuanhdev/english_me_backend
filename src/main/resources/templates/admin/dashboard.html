<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Bảng điều khiển — EnglishMe Admin</title>
	<link rel="stylesheet" th:href="@{/admin/css/admin.css}" />
</head>
<body class="dashboard-body">
	<div class="admin-shell">
		<header class="admin-topbar">
			<div>
				<strong>EnglishMe Admin</strong>
				<br />
				<span id="user-line">Đang tải…</span>
			</div>
			<button type="button" class="btn-ghost" id="btn-logout">Đăng xuất</button>
		</header>
		<main class="admin-main wide">
			<div class="panel">
				<h2>Chào mừng</h2>
				<p>Bạn đã đăng nhập với quyền quản trị. Chọn mục bên dưới để dùng giao diện web gọi API đã triển khai.</p>
				<div class="btn-row" style="margin-top: 1rem">
					<a class="btn-secondary" th:href="@{/admin/vocabularies}" style="text-decoration: none; display: inline-block">Kho từ vựng (CRUD + import)</a>
					<a class="btn-secondary" th:href="@{/admin/questions}" style="text-decoration: none; display: inline-block">Ngân hàng câu hỏi CEFR</a>
					<a class="btn-secondary" th:href="@{/admin/decks}" style="text-decoration: none; display: inline-block">Deck / học viên (API v1)</a>
				</div>
			</div>
		</main>
	</div>
	<script th:src="@{/admin/js/dashboard.js}" defer></script>
</body>
</html>
