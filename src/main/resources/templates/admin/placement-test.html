<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout/fragments :: head}"></head>
<body class="bg-surface text-on-surface">
<aside th:replace="~{admin/layout/fragments :: sidebar('placement-test')}"></aside>
<main class="ml-64 min-h-screen">
    <div th:replace="~{admin/layout/fragments :: topbar}"></div>

    <div class="p-8 space-y-8"
         th:with="curPage=${currentPage != null ? currentPage : 0},
                  pgSize=${pageSize != null ? pageSize : 20},
                  sessions=${sessionsPage != null ? sessionsPage.content : null}">
        <div class="space-y-1">
            <h1 class="text-3xl font-extrabold tracking-tight text-indigo-950 font-headline">Quản lý Bài kiểm tra đầu vào</h1>
            <p class="text-slate-500 font-medium">Theo dõi phiên kiểm tra và kết quả xếp lớp của học viên.</p>
        </div>

        <div class="bg-surface-container-low rounded-[2rem] overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-separate border-spacing-0">
                    <thead>
                    <tr class="bg-slate-100/50">
                        <th class="px-6 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Học viên</th>
                        <th class="px-6 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Email</th>
                        <th class="px-4 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400 text-center">Trạng thái</th>
                        <th class="px-4 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400 text-center">Kết quả CEFR</th>
                        <th class="px-4 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400 text-center">Điểm</th>
                        <th class="px-6 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Bắt đầu</th>
                        <th class="px-6 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400 text-right">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${sessions == null or sessions.isEmpty()}">
                        <td colspan="7" class="px-8 py-10 text-center text-slate-500 font-semibold">
                            Chưa có phiên kiểm tra nào.
                        </td>
                    </tr>
                    <tr th:each="ts : ${sessions}" class="group hover:bg-white transition-all duration-300"
                        th:with="completed=${ts.status != null and ts.status.name() == 'COMPLETED'}">
                        <td class="px-6 py-5">
                            <span class="text-sm font-bold text-indigo-950"
                                  th:text="${ts.user.fullName != null and !#strings.isEmpty(ts.user.fullName) ? ts.user.fullName : 'Chưa cập nhật'}"></span>
                        </td>
                        <td class="px-6 py-5">
                            <span class="text-sm font-medium text-slate-600" th:text="${ts.user.email}"></span>
                        </td>
                        <td class="px-4 py-5 text-center">
                            <span class="inline-flex items-center gap-1.5 px-3 py-1 text-[10px] font-bold uppercase tracking-wider rounded-full"
                                  th:classappend="${completed ? 'bg-green-50 text-green-700' : 'bg-amber-50 text-amber-700'}">
                                <span class="w-1 h-1 rounded-full bg-current"></span><span th:text="${completed ? 'Hoàn thành' : 'Đang làm'}"></span>
                            </span>
                        </td>
                        <td class="px-4 py-5 text-center">
                            <span class="inline-flex items-center px-3 py-1 bg-indigo-50 text-indigo-700 text-xs font-bold rounded-lg"
                                  th:text="${ts.resultLevel != null ? ts.resultLevel : '—'}"></span>
                        </td>
                        <td class="px-4 py-5 text-center">
                            <span class="text-sm font-semibold text-slate-700" th:text="${ts.score != null ? ts.score : '—'}"></span>
                        </td>
                        <td class="px-6 py-5">
                            <span class="text-xs text-slate-500" th:text="${ts.startedAt != null ? #temporals.format(ts.startedAt,'dd/MM/yyyy HH:mm') : '—'}"></span>
                        </td>
                        <td class="px-6 py-5 text-right">
                            <a th:href="@{/admin/placement-test/{id}(id=${ts.id})}"
                               class="inline-flex items-center gap-1.5 px-4 py-2 rounded-xl text-xs font-bold bg-primary text-white hover:opacity-90 transition-opacity">
                                <span class="material-symbols-outlined text-base">visibility</span>
                                Chi tiết
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div th:if="${sessionsPage != null and sessionsPage.totalPages > 1}" class="flex items-center justify-between"
             th:with="prev=${curPage - 1 < 0 ? 0 : curPage - 1},
                      next=${curPage + 1 > sessionsPage.totalPages - 1 ? sessionsPage.totalPages - 1 : curPage + 1}">
            <span class="text-sm text-slate-500">Trang <span th:text="${curPage + 1}"></span> / <span th:text="${sessionsPage.totalPages}"></span></span>
            <div class="flex gap-2">
                <a class="px-4 py-2 rounded-xl bg-white text-slate-600 text-sm font-bold"
                   th:classappend="${curPage == 0 ? 'pointer-events-none opacity-50' : ''}"
                   th:href="@{/admin/placement-test(size=${pgSize},page=${prev})}">Trước</a>
                <a class="px-4 py-2 rounded-xl bg-white text-slate-600 text-sm font-bold"
                   th:classappend="${curPage == sessionsPage.totalPages - 1 ? 'pointer-events-none opacity-50' : ''}"
                   th:href="@{/admin/placement-test(size=${pgSize},page=${next})}">Sau</a>
            </div>
        </div>
    </div>

    <div th:replace="~{admin/layout/fragments :: footer}"></div>
</main>
</body>
</html>
