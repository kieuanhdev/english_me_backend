<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  Fragment dùng chung cho toàn bộ trang admin (Thymeleaf).
  Gọi bằng th:replace="admin/layout/fragments :: head" ...
-->
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnglishMe Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#24389c",
                        "primary-container": "#3f51b5",
                        tertiary: "#643900",
                        "surface": "#f9f9f9",
                        "surface-container-low": "#f3f3f4",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e8e8e8",
                        "secondary-container": "#c9cffd",
                        "on-surface": "#1a1c1c"
                    },
                    fontFamily: {
                        headline: ["Be Vietnam Pro", "sans-serif"],
                        body: ["Be Vietnam Pro", "sans-serif"]
                    }
                }
            }
        };
    </script>
    <style>
        body { font-family: "Be Vietnam Pro", sans-serif; background-color: #f9f9f9; color: #1a1c1c; }
        .font-headline { font-family: "Be Vietnam Pro", sans-serif; }
        .primary-gradient { background: linear-gradient(135deg, #24389c 0%, #3f51b5 100%); }
        .glass-cta { background: rgba(226, 226, 226, 0.7); backdrop-filter: blur(12px); }
    </style>
</head>

<body>
<!--
  Sidebar: active state tính theo requestURI hiện tại.
  th:with khai báo các cờ active để gắn class cho từng mục menu.
-->
<aside th:fragment="sidebar(active)" class="fixed left-0 top-0 h-screen w-64 bg-surface-container-lowest p-6">
    <div class="flex items-center gap-3 mb-8">
        <div class="w-10 h-10 rounded-xl primary-gradient text-white flex items-center justify-center">
            <span class="material-symbols-outlined">menu_book</span>
        </div>
        <div>
            <h2 class="text-lg font-headline font-extrabold text-primary">Admin Panel</h2>
            <p class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Modern Lexicon</p>
        </div>
    </div>
    <nav class="space-y-2 text-sm font-semibold">
        <a th:href="@{/admin}" class="flex items-center gap-3 px-4 py-3 rounded-xl"
           th:classappend="${active == 'overview'} ? 'bg-indigo-50 text-primary' : 'text-slate-600 hover:bg-slate-100'"><span class="material-symbols-outlined">dashboard</span>Overview</a>
        <a th:href="@{/admin/desks}" class="flex items-center gap-3 px-4 py-3 rounded-xl"
           th:classappend="${active == 'desks'} ? 'bg-indigo-50 text-primary' : 'text-slate-600 hover:bg-slate-100'"><span class="material-symbols-outlined">menu_book</span>Desk / Flashcard</a>
        <a th:href="@{/admin/users}" class="flex items-center gap-3 px-4 py-3 rounded-xl"
           th:classappend="${active == 'users'} ? 'bg-indigo-50 text-primary' : 'text-slate-600 hover:bg-slate-100'"><span class="material-symbols-outlined">group</span>Users</a>
        <a th:href="@{/admin/pronunciation}" class="flex items-center gap-3 px-4 py-3 rounded-xl"
           th:classappend="${active == 'pronunciation'} ? 'bg-indigo-50 text-primary' : 'text-slate-600 hover:bg-slate-100'"><span class="material-symbols-outlined">graphic_eq</span>Pronunciation</a>
        <a th:href="@{/admin/grammar}" class="flex items-center gap-3 px-4 py-3 rounded-xl"
           th:classappend="${active == 'grammar'} ? 'bg-indigo-50 text-primary' : 'text-slate-600 hover:bg-slate-100'"><span class="material-symbols-outlined">auto_stories</span>Grammar</a>
        <a th:href="@{/admin/exercises}" class="flex items-center gap-3 px-4 py-3 rounded-xl"
           th:classappend="${active == 'exercises'} ? 'bg-indigo-50 text-primary' : 'text-slate-600 hover:bg-slate-100'"><span class="material-symbols-outlined">quiz</span>Exercise Bank</a>
        <a th:href="@{/admin/lessons}" class="flex items-center gap-3 px-4 py-3 rounded-xl"
           th:classappend="${active == 'lessons'} ? 'bg-indigo-50 text-primary' : 'text-slate-600 hover:bg-slate-100'"><span class="material-symbols-outlined">school</span>Learning lessons</a>
        <a th:href="@{/admin/placement-test}" class="flex items-center gap-3 px-4 py-3 rounded-xl"
           th:classappend="${active == 'placement-test'} ? 'bg-indigo-50 text-primary' : 'text-slate-600 hover:bg-slate-100'"><span class="material-symbols-outlined">quiz</span>Placement Test</a>
        <a th:href="@{/admin/xp-rules}" class="flex items-center gap-3 px-4 py-3 rounded-xl"
           th:classappend="${active == 'xp-rules'} ? 'bg-indigo-50 text-primary' : 'text-slate-600 hover:bg-slate-100'"><span class="material-symbols-outlined">bolt</span>Cấu hình XP</a>
        <a th:href="@{/admin/config}" class="flex items-center gap-3 px-4 py-3 rounded-xl"
           th:classappend="${active == 'config'} ? 'bg-indigo-50 text-primary' : 'text-slate-600 hover:bg-slate-100'"><span class="material-symbols-outlined">smart_toy</span>Cấu hình AI</a>
    </nav>
</aside>

<header th:fragment="topbar" class="sticky top-0 z-10 bg-surface/80 backdrop-blur px-8 py-4 flex items-center justify-between">
    <input type="text" placeholder="Search resources, users..." class="w-full max-w-md rounded-xl border-0 bg-surface-container-high px-4 py-2.5 focus:ring-2 focus:ring-primary/20">
    <div class="ml-6 flex items-center gap-3">
        <div class="text-right">
            <p class="text-sm font-bold text-primary">Admin Scholar</p>
            <p class="text-[11px] text-slate-500">Curator Access</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold">A</div>
        <form method="post" th:action="@{/admin/logout}">
<input type="hidden" name="_csrf" th:value="${session.CSRF_TOKEN}"/>
            <button type="submit" class="rounded-xl bg-surface-container-high px-3 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-200">
                Đăng xuất
            </button>
        </form>
    </div>
</header>

<footer th:fragment="footer" class="px-8 pb-8">
    <div class="rounded-2xl bg-surface-container-low p-4 text-xs text-slate-500">
        © 2026 EnglishMe Admin
    </div>
</footer>
</body>
</html>
