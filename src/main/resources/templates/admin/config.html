<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout/fragments :: head}"></head>
<body class="bg-surface text-on-surface">
<aside th:replace="~{admin/layout/fragments :: sidebar('config')}"></aside>
<main class="ml-64 min-h-screen">
    <div th:replace="~{admin/layout/fragments :: topbar}"></div>

    <div class="p-8 space-y-8">
        <section class="primary-gradient text-white rounded-3xl p-10 relative overflow-hidden">
            <h1 class="text-4xl font-headline font-black mb-3">Cấu hình AI</h1>
            <p class="max-w-2xl text-indigo-100">Quản lý mô hình AI, prompt từng chức năng và giới hạn sử dụng. Đổi giá trị rồi bấm Lưu từng mục.</p>
        </section>

        <!-- Test kết nối LLM. -->
        <section class="bg-surface-container-lowest rounded-2xl p-6 border border-indigo-100">
            <div class="flex items-center gap-2 mb-2">
                <h2 class="text-xl font-bold text-on-surface">Kiểm tra kết nối</h2>
                <span class="text-[10px] font-bold uppercase tracking-widest bg-indigo-100 text-primary px-2 py-0.5 rounded-full">OpenAI-compatible</span>
            </div>
            <p class="text-sm text-slate-500 mb-4">Sau khi nhập LLM_BASE_URL, LLM_MODEL, LLM_API_KEY (Lưu hoặc gõ trực tiếp), bấm để kiểm tra key có hoạt động không.</p>
            <button type="button" id="btn-test-llm"
                    class="px-5 py-2 bg-emerald-600 text-white text-sm font-semibold rounded-xl hover:opacity-90">
                Test kết nối LLM
            </button>
            <div id="llm-test-result" class="mt-3 text-sm hidden rounded-xl px-4 py-3"></div>
        </section>

        <div th:if="${successMessage != null}" class="bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-2xl px-6 py-4" th:text="${successMessage}"></div>
        <div th:if="${errorMessage != null}" class="bg-red-50 border border-red-200 text-red-800 rounded-2xl px-6 py-4" th:text="${errorMessage}"></div>

        <!-- Nhóm theo tiền tố key: LLM_ → Mô hình AI; STT_ → Speech-to-Text; AI_PROMPT_ → Prompt; AI_ (khác) → Tham số AI; còn lại → Khác. -->
        <div th:each="group : ${ {'Mô hình AI (LLM)','Speech-to-Text (STT)','Prompt chức năng','Tham số AI & giới hạn','Khác'} }"
             th:with="groupConfigs=${configs == null ? null : #lists.toList(configs).?[
                          (#strings.startsWith(configKey,'LLM_') ? 'Mô hình AI (LLM)'
                           : (#strings.startsWith(configKey,'STT_') ? 'Speech-to-Text (STT)'
                              : (#strings.startsWith(configKey,'AI_PROMPT_') ? 'Prompt chức năng'
                                 : (#strings.startsWith(configKey,'AI_') ? 'Tham số AI & giới hạn' : 'Khác')))) == group]}"
             th:if="${groupConfigs != null and !groupConfigs.isEmpty()}" class="space-y-4">
            <h2 class="text-lg font-bold text-slate-700 mt-2" th:text="${group}"></h2>
            <div th:each="cfg : ${groupConfigs}" class="bg-surface-container-lowest rounded-2xl p-6"
                 th:with="isSecret=${cfg.secret},
                          isMultiline=${(cfg.configKey != null and #strings.startsWith(cfg.configKey,'AI_PROMPT_')) or cfg.valueType == 'json'},
                          rawValue=${cfg.configValue != null ? cfg.configValue : ''}">
                <div class="flex items-start justify-between gap-4 mb-4">
                    <div>
                        <div class="flex items-center gap-2">
                            <code class="text-sm font-bold text-primary bg-indigo-50 px-2 py-0.5 rounded" th:text="${cfg.configKey}"></code>
                            <span th:if="${isSecret}" class="text-[10px] font-bold uppercase tracking-widest bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">Secret</span>
                            <span class="text-[10px] font-bold uppercase tracking-widest bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full" th:text="${cfg.valueType}"></span>
                        </div>
                        <p th:if="${cfg.description != null}" class="text-sm text-slate-500 mt-1" th:text="${cfg.description}"></p>
                    </div>
                    <p th:if="${cfg.updatedAt != null}" class="text-xs text-slate-400 whitespace-nowrap">Cập nhật: <span th:text="${#temporals.format(cfg.updatedAt,'dd/MM/yyyy HH:mm')}"></span><span th:if="${cfg.updatedByEmail != null}"> bởi <span th:text="${cfg.updatedByEmail}"></span></span>
                    </p>
                </div>
                <form th:if="${isMultiline}" method="post" th:action="@{/admin/config}" class="space-y-3">
<input type="hidden" name="_csrf" th:value="${session.CSRF_TOKEN}"/>
                    <input type="hidden" name="key" th:value="${cfg.configKey}">
                    <textarea name="value" rows="10"
                        th:placeholder="${isSecret and !#strings.isEmpty(rawValue) ? 'Đã có giá trị (ẩn). Dán giá trị mới để thay.' : ''}"
                        class="w-full font-mono text-xs border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-300"
                        th:text="${isSecret ? '' : rawValue}"></textarea>
                    <div class="flex justify-end">
                        <button type="submit" class="px-5 py-2 bg-primary text-white text-sm font-semibold rounded-xl hover:opacity-90">Lưu</button>
                    </div>
                </form>
                <form th:unless="${isMultiline}" method="post" th:action="@{/admin/config}" class="flex gap-3"
                      th:with="displayValue=${(isSecret and !#strings.isEmpty(rawValue)) ? '••••••••' : rawValue}">
<input type="hidden" name="_csrf" th:value="${session.CSRF_TOKEN}"/>
                    <input type="hidden" name="key" th:value="${cfg.configKey}">
                    <input
                        th:type="${isSecret ? 'password' : 'text'}"
                        name="value"
                        th:placeholder="${isSecret ? 'Nhập giá trị mới...' : displayValue}"
                        th:value="${isSecret ? '' : displayValue}"
                        class="flex-1 border border-slate-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
                    >
                    <button type="submit" class="px-5 py-2 bg-primary text-white text-sm font-semibold rounded-xl hover:opacity-90">Lưu</button>
                </form>
            </div>
        </div>
    </div>
</main>

<script th:inline="javascript">
    (function () {
        var btn = document.getElementById('btn-test-llm');
        var box = document.getElementById('llm-test-result');
        if (!btn) return;

        // Lấy giá trị đang gõ trong các ô LLM (nếu admin chưa Lưu). Rỗng -> backend dùng giá trị DB.
        function fieldValue(key) {
            var input = document.querySelector('input[name="key"][value="' + key + '"]');
            if (!input) return '';
            var form = input.closest('form');
            var valInput = form ? form.querySelector('input[name="value"]') : null;
            return valInput ? valInput.value.trim() : '';
        }

        function show(success, message) {
            box.classList.remove('hidden');
            box.className = 'mt-3 text-sm rounded-xl px-4 py-3 '
                + (success ? 'bg-emerald-50 border border-emerald-200 text-emerald-800'
                           : 'bg-red-50 border border-red-200 text-red-800');
            box.textContent = (success ? '✓ ' : '✗ ') + message;
        }

        btn.addEventListener('click', function () {
            btn.disabled = true;
            var original = btn.textContent;
            btn.textContent = 'Đang kiểm tra...';

            var url = /*[[@{/admin/config/test-llm}]]*/ '/admin/config/test-llm';
            var params = new URLSearchParams();
            params.append('baseUrl', fieldValue('LLM_BASE_URL'));
            params.append('apiKey', fieldValue('LLM_API_KEY'));
            params.append('model', fieldValue('LLM_MODEL'));
            // CSRF token bắt buộc cho mọi POST /admin/** (CsrfInterceptor).
            var csrfInput = document.querySelector('input[name="_csrf"]');
            if (csrfInput) params.append('_csrf', csrfInput.value);

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            })
            .then(function (r) { return r.json(); })
            .then(function (data) { show(data.success, data.message || ''); })
            .catch(function (e) { show(false, 'Lỗi gọi test: ' + e); })
            .finally(function () {
                btn.disabled = false;
                btn.textContent = original;
            });
        });
    })();
</script>
</body>
</html>
