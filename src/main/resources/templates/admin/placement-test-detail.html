<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout/fragments :: head}"></head>
<body class="bg-surface text-on-surface">
<aside th:replace="~{admin/layout/fragments :: sidebar('placement-test')}"></aside>
<main class="ml-64 min-h-screen">
    <div th:replace="~{admin/layout/fragments :: topbar}"></div>

    <div class="p-8 space-y-8">
        <div class="flex items-center gap-3">
            <a th:href="@{/admin/placement-test}" class="text-xs font-bold text-primary hover:underline inline-flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">arrow_back</span> Danh sách phiên kiểm tra
            </a>
        </div>

        <th:block th:if="${session != null}">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-surface-container-lowest rounded-2xl p-6">
                <p class="text-xs font-bold tracking-wider text-slate-500 uppercase">Học viên</p>
                <h3 class="text-lg text-primary font-black font-headline mt-1"
                    th:text="${session.user.fullName != null and !#strings.isEmpty(session.user.fullName) ? session.user.fullName : 'Chưa cập nhật'}"></h3>
                <p class="text-sm text-slate-500" th:text="${session.user.email}"></p>
            </div>
            <div class="bg-surface-container-lowest rounded-2xl p-6">
                <p class="text-xs font-bold tracking-wider text-slate-500 uppercase">Kết quả</p>
                <h3 class="text-lg text-primary font-black font-headline mt-1" th:text="${session.resultLevel != null ? session.resultLevel : 'Chưa có'}"></h3>
                <p class="text-sm text-slate-500">Điểm: <span th:text="${session.score != null ? session.score : '—'}"></span></p>
            </div>
            <div class="bg-surface-container-lowest rounded-2xl p-6">
                <p class="text-xs font-bold tracking-wider text-slate-500 uppercase">Thời gian</p>
                <h3 class="text-lg text-primary font-black font-headline mt-1"
                    th:text="${session.startedAt != null ? #temporals.format(session.startedAt,'dd/MM/yyyy HH:mm') : '—'}"></h3>
                <p class="text-sm text-slate-500">
                    <span th:if="${session.completedAt != null}">Hoàn thành: <span th:text="${#temporals.format(session.completedAt,'dd/MM/yyyy HH:mm')}"></span></span>
                    <span th:unless="${session.completedAt != null}" th:text="${session.status != null and session.status.name() == 'COMPLETED' ? 'Đã hoàn thành' : 'Đang làm'}"></span>
                </p>
            </div>
        </div>

        <div class="bg-surface-container-low rounded-[2rem] p-8 space-y-6">
            <h2 class="text-lg font-headline font-black text-primary flex items-center gap-2">
                <span class="material-symbols-outlined">quiz</span> Câu trả lời (<span th:text="${answers != null ? answers.size() : 0}"></span>)
            </h2>
            <div class="space-y-4">
                <p th:if="${answers == null or answers.isEmpty()}" class="text-slate-500 text-sm">Chưa trả lời câu hỏi nào.</p>
                <div th:each="answer, iter : ${answers}"
                     th:with="question=${answer.question},
                              selected=${answer.selectedAnswer},
                              correct=${answer.isCorrect == true},
                              rowBg=${(answer.isCorrect == true) ? 'bg-emerald-50 border-emerald-100' : (answer.selectedAnswer == null ? 'bg-slate-50 border-slate-100' : 'bg-rose-50 border-rose-100')}"
                     class="rounded-xl p-5 border" th:classappend="${rowBg}">
                    <div class="flex items-start justify-between gap-3">
                        <div class="flex-1 space-y-2">
                            <div class="flex items-center gap-2">
                                <span class="inline-flex items-center justify-center w-6 h-6 rounded-lg bg-indigo-100 text-primary text-xs font-bold" th:text="${iter.count}"></span>
                                <span class="text-[10px] font-black uppercase tracking-wider text-slate-400"><span th:text="${question.cefrLevel}"></span> &middot; <span th:text="${question.skillCategory}"></span></span>
                            </div>
                            <p class="text-sm font-semibold text-indigo-950" th:text="${question.question}"></p>
                            <div class="grid grid-cols-2 gap-2 text-xs">
                                <span th:each="entry : ${question.options}" class="px-3 py-1.5 rounded-lg border"
                                      th:classappend="${entry.key == question.correctAnswer
                                          ? 'bg-emerald-100 text-emerald-800 font-bold border-emerald-300'
                                          : ((entry.key == selected and !correct) ? 'bg-rose-100 text-rose-800 font-bold border-rose-300' : 'bg-white text-slate-600 border-slate-100')}">
                                    <span th:text="${entry.key}"></span>. <span th:text="${entry.value}"></span>
                                </span>
                            </div>
                            <p th:if="${question.explanation != null and !#strings.isEmpty(question.explanation)}" class="text-xs text-slate-500 italic mt-1" th:text="${question.explanation}"></p>
                        </div>
                        <div class="flex flex-col items-center gap-1">
                            <th:block th:if="${correct}">
                                <span class="material-symbols-outlined text-emerald-600">check_circle</span>
                                <span class="text-[10px] font-bold text-emerald-600">Đúng</span>
                            </th:block>
                            <th:block th:if="${!correct and selected == null}">
                                <span class="material-symbols-outlined text-slate-400">remove_circle</span>
                                <span class="text-[10px] font-bold text-slate-400">Bỏ qua</span>
                            </th:block>
                            <th:block th:if="${!correct and selected != null}">
                                <span class="material-symbols-outlined text-rose-600">cancel</span>
                                <span class="text-[10px] font-bold text-rose-600">Sai</span>
                            </th:block>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </th:block>
    </div>

    <div th:replace="~{admin/layout/fragments :: footer}"></div>
</main>
</body>
</html>
