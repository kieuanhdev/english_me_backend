# Sao chép thành application-local.yml (cùng cấp pom.xml). File local không nên commit.

spring:
  datasource:
    url: jdbc:postgresql://HOST:5432/DATABASE?currentSchema=englishme
    username: USER
    password: PASSWORD
  jpa:
    properties:
      hibernate:
        default_schema: englishme

# Tuỳ chọn public (user cần quyền CREATE trên schema public):
#   url: ...?currentSchema=public  +  default_schema: public
# Production: JPA_DDL_AUTO=validate và quản lý schema thủ công nếu cần.
#
# Nếu đổi bảng user (app_user → users) mà Hibernate báo lỗi khi thêm FK refresh_token:
#   DELETE FROM englishme.refresh_token rt
#   WHERE NOT EXISTS (SELECT 1 FROM englishme.users u WHERE u.id = rt.user_id);
# Sau đó có thể thêm FK thủ công (ON DELETE CASCADE) nếu cần ràng buộc ở DB.
